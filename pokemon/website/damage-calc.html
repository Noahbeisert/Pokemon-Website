<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Damage Calculator</title>
<link rel="stylesheet" href="css/damage-calc.css">
</head>
<body>
<h1>⚔ Damage Calculator</h1>
<div class="layout">
  <div class="team-col"><h2>My Team</h2><div id="my-slots"></div></div>
  <div class="calc-col">
    <h2>Calculator</h2>
    <div class="calc-selectors">
      <div class="sel-row"><label>Attacker</label><select id="sel-atk" onchange="onAtkChange()"><option value="">— pick —</option></select></div>
      <div class="sel-row"><label>Move</label><select id="sel-move"><option value="">— pick attacker first —</option></select></div>
      <div class="sel-row"><label>Defender</label><select id="sel-def"><option value="">— pick —</option></select></div>
    </div>
    <div class="field-panel">
      <div class="field-group">
        <div class="field-group-label">Weather</div>
        <div class="field-btns">
          <button class="weather-btn field-btn active" data-w="none" onclick="setWeather('none')">—</button>
          <button class="weather-btn field-btn" data-w="sun" onclick="setWeather('sun')">Sun</button>
          <button class="weather-btn field-btn" data-w="rain" onclick="setWeather('rain')">Rain</button>
          <button class="weather-btn field-btn" data-w="sand" onclick="setWeather('sand')">Sand</button>
          <button class="weather-btn field-btn" data-w="snow" onclick="setWeather('snow')">Snow</button>
        </div>
      </div>
      <div class="field-group">
        <div class="field-group-label">Terrain</div>
        <div class="field-btns">
          <button class="terrain-btn field-btn active" data-t="none" onclick="setTerrain('none')">—</button>
          <button class="terrain-btn field-btn" data-t="electric" onclick="setTerrain('electric')">Electric</button>
          <button class="terrain-btn field-btn" data-t="grassy" onclick="setTerrain('grassy')">Grassy</button>
          <button class="terrain-btn field-btn" data-t="psychic" onclick="setTerrain('psychic')">Psychic</button>
          <button class="terrain-btn field-btn" data-t="misty" onclick="setTerrain('misty')">Misty</button>
        </div>
      </div>
      <div class="field-group">
        <div class="field-group-label">Screens</div>
        <div class="field-btns">
          <label class="field-check"><input type="checkbox" onchange="S.screens.reflect=this.checked"> Reflect</label>
          <label class="field-check"><input type="checkbox" onchange="S.screens.lightscreen=this.checked"> Light Screen</label>
          <label class="field-check"><input type="checkbox" onchange="S.screens.auroraveil=this.checked"> Aurora Veil</label>
        </div>
      </div>
    </div>
    <button class="calc-btn" onclick="calculate()">Calculate</button>
    <div id="result"><div class="empty">Fill in teams and press Calculate</div></div>
  </div>
  <div class="team-col"><h2>Enemy Team</h2><div id="enemy-slots"></div></div>
</div>
<script src="js/damage-calc.js"></script>
</body>
</html>
